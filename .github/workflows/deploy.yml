name: SeaBite CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'client/package-lock.json'

    - name: Install Client Dependencies
      run: |
        cd client
        npm ci

    - name: Build Client
      run: |
        cd client
        npm run build
      env:
        VITE_API_URL: ${{ secrets.VITE_API_URL }}

    - name: Install Server Dependencies
      run: |
        cd server
        npm ci

    - name: Run Server Lint (Optional)
      run: |
        cd server
        # npm run lint # Enable if you have linting setup

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to Vercel/Production
      run: echo "🚀 Triggering production deployment via webhook/CLI..."
      # You can integrate Vercel CLI or other deployment triggers here
